<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="AgriGenius - Direct market access and tools for farmers.">
  <title>AgriGenius</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: {} } }</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    html { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue'; }
    .fade { transition: opacity .35s ease, transform .35s ease; }
    .card-anim { transform: translateY(6px); opacity: 0; animation: pop .5s forwards; }
    @keyframes pop { to { transform: translateY(0); opacity: 1; } }
  </style>
  <!-- Analytics stub -->
  <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} /* placeholder analytics */</script>
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="bg-white/90 backdrop-blur sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="text-2xl font-extrabold tracking-tight">AgriGenius</a>
      <div class="flex items-center gap-4">
        <nav class="hidden md:flex gap-4">
          <a href="/market/" class="text-sm hover:underline">Marketplace</a>
          <a href="/schemes/" class="text-sm hover:underline">Schemes</a>
          <a href="/dashboard/" class="text-sm hover:underline">Dashboard</a>
        </nav>
        <button id="darkToggle" class="p-2 rounded bg-gray-100">🌙</button>
      </div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-10">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center py-6 text-sm text-gray-600">© AgriGenius</footer>

  <!-- Chatbot link to ChatGPT -->
  <a href="https://chat.openai.com/" target="_blank" class="fixed right-6 bottom-6 bg-green-600 text-white px-4 py-3 rounded-full shadow-lg">Chat with AI</a>

  <script>
    // dark mode toggle
    const btn = document.getElementById('darkToggle');
    btn?.addEventListener('click', ()=>{
      document.documentElement.classList.toggle('dark');
      document.body.classList.toggle('bg-gray-900');
      document.body.classList.toggle('text-white');
    });
    // simple fade-in for cards
    document.querySelectorAll('.card-anim').forEach((el,i)=> el.style.animationDelay = (i*0.08)+'s');
  </script>
</body>
</html>
