{% extends "base.html" %}
{% block content %}
<div class="mb-6 flex justify-between items-center">
  <h2 class="text-xl font-bold">Marketplace</h2>
  <form method="get" class="flex items-center gap-2">
    <input name="q" placeholder="Search crops..." class="border p-2 rounded" value="{{ request.GET.q|default:'' }}">
    <button class="px-3 py-2 bg-green-600 text-white rounded">Search</button>
  </form>
</div>
<div class="grid md:grid-cols-3 gap-4">
  {% for crop in crops %}
  <div class="bg-white p-4 rounded shadow hover:shadow-lg transition transform hover:-translate-y-1">
    <div class="flex justify-between items-center">
      <div>
        <h3 class="font-semibold">{{ crop.name }}</h3>
        <p class="text-sm text-gray-500">{{ crop.category }}</p>
      </div>
      <div class="text-right">
        <div class="text-sm">Avg</div>
        <div class="text-lg font-bold">₹<span data-price data-base="{{ crop.avg_price }}">{{ crop.avg_price }}</span></div>
      </div>
    </div>
    <p class="mt-3 text-sm text-gray-600">{{ crop.description|truncatechars:80 }}</p>
    <div class="mt-3 flex gap-2">
      <a class="px-3 py-2 bg-blue-600 text-white rounded text-sm" href="#">Buy</a>
      <a class="px-3 py-2 border rounded text-sm" href="#">Contact Farmer</a>
    </div>
  </div>
  {% endfor %}
</div>
<script src="/static/agri_app/js/price_updates.js"></script>
{% endblock %}
