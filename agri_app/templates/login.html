{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-lg font-bold mb-4">Login</h2>
  <form method="post">{% csrf_token %}
    <input name="username" placeholder="Username" class="w-full border p-2 mb-2">
    <input name="password" placeholder="Password" type="password" class="w-full border p-2 mb-2">
    <button class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
  </form>
</div>
{% endblock %}
